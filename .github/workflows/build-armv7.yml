name: Build ARMv7 Docker Image

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-armv7:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: "1.25"

      - name: Setup NodeJS
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Build ARMv7 binaries
        run: |
          go mod tidy
          pnpm --prefix webui install
          GOOS=linux BACKREST_BUILD_VERSION=dev go generate ./...
          CGO_ENABLED=0 GOOS=linux GOARCH=arm GOARM=7 go build -ldflags "-s -w" -o backrest ./cmd/backrest
          CGO_ENABLED=0 GOOS=linux GOARCH=arm GOARM=7 go build -ldflags "-s -w" -o docker-entrypoint ./cmd/docker-entrypoint

      - name: Build ARMv7 Alpine Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.alpine
          platforms: linux/arm/v7
          push: false
          outputs: type=docker,dest=/tmp/backrest-armv7-alpine.tar
          tags: backrest:armv7-alpine

      - name: Build ARMv7 Scratch Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.scratch
          platforms: linux/arm/v7
          push: false
          outputs: type=docker,dest=/tmp/backrest-armv7-scratch.tar
          tags: backrest:armv7-scratch

      - name: Upload Alpine image artifact
        uses: actions/upload-artifact@v4
        with:
          name: backrest-armv7-alpine-docker-image
          path: /tmp/backrest-armv7-alpine.tar

      - name: Upload Scratch image artifact
        uses: actions/upload-artifact@v4
        with:
          name: backrest-armv7-scratch-docker-image
          path: /tmp/backrest-armv7-scratch.tar

      - name: Print usage instructions
        run: |
          echo "============================================"
          echo "ARMv7 Docker images built successfully!"
          echo ""
          echo "Download the image artifacts from this workflow run,"
          echo "then load with:"
          echo "  docker load -i backrest-armv7-alpine.tar"
          echo "  docker load -i backrest-armv7-scratch.tar"
          echo ""
          echo "Then run with:"
          echo "  docker run backrest:armv7-alpine"
          echo "  docker run backrest:armv7-scratch"
          echo "============================================"
